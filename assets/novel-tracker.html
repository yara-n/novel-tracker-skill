<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小说记录</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f2;
      --paper: #fffefe;
      --paper-2: #f8faf7;
      --ink: #1f2520;
      --muted: #66706a;
      --line: #dce4dc;
      --line-strong: #c4d0c7;
      --green: #1f5a4f;
      --green-soft: #e8f1ec;
      --berry: #a94b64;
      --berry-soft: #f8e9ee;
      --gold: #9c6b15;
      --gold-soft: #f7edd8;
      --blue: #315d87;
      --blue-soft: #e5edf6;
      --shadow: 0 8px 24px rgba(31, 48, 39, 0.08);
      --radius: 8px;
      font-family: "PingFang SC", "Microsoft YaHei", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(244, 246, 242, 0.92) 220px),
        var(--bg);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      touch-action: manipulation;
      font-size: 14px;
    }

    button {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      min-height: 38px;
      padding: 8px 12px;
      font-weight: 560;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      border-color: var(--green);
      background: var(--paper-2);
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .primary:hover {
      background: color-mix(in srgb, var(--green) 86%, #000);
      color: #fff;
    }

    .danger {
      border-color: #b86b6b;
      color: #8b2424;
    }

    .icon-button {
      width: 38px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 17px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
      min-height: 40px;
    }

    input:disabled,
    textarea:disabled,
    select:disabled,
    button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
    }

    textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.6;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 22%, transparent);
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 254, 253, 0.9);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--green-soft);
      color: var(--green);
      font-weight: 700;
      font-size: 20px;
      flex: 0 0 auto;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 21px;
      line-height: 1.2;
      font-weight: 720;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .theme-select {
      width: auto;
      min-width: 124px;
      border: 1.5px solid var(--green);
      background: var(--green-soft);
      color: var(--green);
      font-weight: 700;
      cursor: pointer;
    }

    .theme-select:hover {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .style-select {
      width: auto;
      min-width: 124px;
      border: 1px solid var(--line-strong);
      background: var(--paper);
      color: var(--ink);
      font-weight: 600;
      cursor: pointer;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(460px, 1.15fr) minmax(360px, 0.85fr);
      gap: 16px;
      align-items: start;
      padding: 16px 20px 22px;
      min-height: 0;
    }

    .layout:not(.detail-open) {
      grid-template-columns: minmax(0, 1fr);
    }

    .layout:not(.detail-open) .editor {
      display: none;
    }

    .panel {
      background: rgba(255, 254, 253, 0.97);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .library {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: calc(100vh - 118px);
    }

    .toolbar {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.8fr) minmax(130px, 0.8fr) minmax(150px, 1fr);
      gap: 8px;
    }

    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
      background: var(--paper-2);
      white-space: nowrap;
    }

    .view-switch {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: 3px;
      gap: 3px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper-2);
    }

    .view-switch button {
      min-height: 30px;
      border: 0;
      border-radius: 999px;
      padding: 5px 11px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .view-switch button:hover {
      background: color-mix(in srgb, var(--green-soft) 70%, #fff);
      color: var(--green);
    }

    .view-switch button.active {
      background: var(--green);
      color: #fff;
      box-shadow: 0 4px 12px color-mix(in srgb, var(--green) 22%, transparent);
    }

    .book-list {
      min-height: 0;
      overflow: auto;
    }

    .list-head,
    .book-row {
      display: grid;
      grid-template-columns: minmax(190px, 1.35fr) minmax(126px, 0.74fr) 86px 104px 66px;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
    }

    .list-head {
      position: sticky;
      top: 0;
      z-index: 5;
      color: var(--muted);
      background: var(--paper-2);
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
    }

    .book-row {
      width: 100%;
      min-height: 70px;
      text-align: left;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding-block: 10px;
      touch-action: manipulation;
      user-select: none;
    }

    .book-row:hover {
      background: var(--paper-2);
      border-color: var(--line);
    }

    .book-row.active {
      background: var(--green-soft);
      box-shadow: inset 3px 0 0 var(--green);
    }

    .book-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .book-card {
      width: 100%;
      min-height: 168px;
      display: grid;
      align-content: space-between;
      gap: 12px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 12px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--green-soft) 76%, #fff) 0%, #fff 56%),
        var(--paper);
      padding: 13px;
      box-shadow: 0 8px 20px rgba(40, 70, 110, 0.07);
    }

    .book-card:hover {
      border-color: color-mix(in srgb, var(--green) 46%, var(--line));
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--green-soft) 90%, #fff) 0%, #fff 62%),
        var(--paper);
      transform: translateY(-1px);
    }

    .book-card.active {
      border-color: var(--green);
      box-shadow: 0 10px 24px color-mix(in srgb, var(--green) 16%, transparent), inset 0 0 0 1px var(--green);
    }

    .card-top,
    .card-bottom {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .card-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .book-table-wrap {
      padding: 0;
      overflow: auto;
    }

    .book-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 880px;
      font-size: 13px;
    }

    .book-table th,
    .book-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    .book-table th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--paper-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
      white-space: nowrap;
    }

    .book-table tbody tr {
      cursor: pointer;
    }

    .book-table tbody tr:hover {
      background: var(--paper-2);
    }

    .book-table tbody tr.active {
      background: var(--green-soft);
      box-shadow: inset 3px 0 0 var(--green);
    }

    .table-title {
      min-width: 190px;
      font-weight: 720;
      color: var(--ink);
    }

    .table-note {
      min-width: 240px;
      max-width: 360px;
      color: var(--muted);
    }

    .book-main {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .book-title {
      font-weight: 700;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .book-meta,
    .book-note {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-width: 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 23px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      line-height: 1.2;
      overflow-wrap: anywhere;
      background: var(--green-soft);
      color: var(--green);
    }

    .status {
      display: inline-grid;
      place-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-想看 { background: var(--paper-2); color: var(--muted); box-shadow: inset 0 0 0 1px var(--line); }
    .status-在看 { background: var(--green-soft); color: var(--green); }
    .status-追更 { background: #f4e6de; color: #a05a40; }
    .status-已读完 { background: #e7ecf0; color: #4f6a86; }
    .status-弃文 { background: #ece7e0; color: #80735f; }

    .rating {
      color: var(--gold);
      letter-spacing: 0;
      font-size: 14px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .rating-number {
      color: var(--muted);
      font-size: 12px;
      min-width: 18px;
      margin-left: 0;
    }

    .empty {
      padding: 28px 18px;
      color: var(--muted);
      line-height: 1.8;
    }

    .editor {
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: sticky;
      top: 96px;
      height: calc(100vh - 116px);
      min-height: 520px;
      max-height: 860px;
      border: 2px solid var(--line-strong);
      border-left: 4px solid var(--green);
      box-shadow: 0 12px 30px rgba(31, 48, 39, 0.13);
      overflow: hidden;
    }

    .editor-head {
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--paper-2);
      display: grid;
      gap: 10px;
    }

    .editor-title-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .editor-title-row h2 {
      font-size: 17px;
      line-height: 1.25;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .editor-body {
      overflow: auto;
      scrollbar-gutter: stable;
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .date-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .date-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper-2);
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 6px;
      color: var(--green);
      font-size: 13px;
      font-weight: 720;
    }

    .star-control {
      display: grid;
      grid-template-columns: repeat(5, 36px);
      gap: 6px;
    }

    .star-control button {
      width: 36px;
      height: 36px;
      min-height: 36px;
      padding: 0;
      font-size: 18px;
      color: var(--gold);
      background: var(--paper);
    }

    .star-control button.active {
      background: var(--gold-soft);
      border-color: var(--gold);
      color: var(--gold);
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      background: var(--paper-2);
    }

    .save-state {
      color: var(--muted);
      font-size: 12px;
      min-width: 92px;
    }

    .save-state.pending {
      color: var(--gold);
      font-weight: 700;
    }

    .save-state.confirmed {
      color: var(--green);
      font-weight: 700;
    }

    .save-flash {
      box-shadow: 0 0 0 4px rgba(31, 90, 79, 0.14);
      transform: translateY(-1px);
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .manual-form-block {
      border: 1px solid #e0e7df;
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .toast {
      position: fixed;
      top: 92px;
      right: 24px;
      z-index: 50;
      max-width: min(360px, calc(100vw - 28px));
      border: 1px solid var(--line-strong);
      border-left: 4px solid var(--green);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      color: var(--ink);
      padding: 11px 13px;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.active {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      border-left-color: #8b2424;
    }

    .hidden-file {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @media (min-width: 1121px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .app {
        height: 100vh;
        min-height: 0;
      }

      .layout {
        height: 100%;
        overflow: hidden;
      }

      .library {
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .editor {
        position: relative;
        top: auto;
        height: 100%;
        min-height: 0;
        max-height: none;
      }
    }

    @media (max-width: 1120px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .library,
      .editor {
        min-height: auto;
      }

      .editor {
        position: static;
        top: auto;
        height: auto;
        max-height: none;
        grid-template-rows: auto auto auto;
      }

      .editor-body {
        overflow: visible;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .top-actions {
        justify-content: stretch;
      }

      .top-actions button {
        flex: 1 1 calc(50% - 8px);
      }

      .theme-select {
        flex: 1 1 100%;
        width: 100%;
      }

      .layout {
        padding: 12px;
      }

      .editor {
        order: -1;
      }

      .library {
        order: 0;
      }

      .search-row,
      .filter-row,
      .field-grid,
      .editor-title-row {
        grid-template-columns: 1fr;
      }

      .list-head {
        display: none;
      }

      .book-row,
      .book-card {
        grid-template-columns: 1fr;
        gap: 8px;
        align-items: start;
      }

      .book-row > * {
        min-width: 0;
      }

      .book-title,
      .book-meta,
      .book-note {
        white-space: normal;
      }

      .view-switch {
        width: 100%;
      }

      .view-switch button {
        flex: 1 1 0;
      }

      .toast {
        top: 12px;
        right: 14px;
        left: 14px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">书</div>
        <div>
          <h1>小说记录</h1>
          <p class="subtitle">私人书架、追更进度、长评和情节备忘</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="primary" id="newBookBtn" type="button">新建记录</button>
        <button id="exportBtn" type="button">导出备份</button>
        <button id="importBtn" type="button">导入备份</button>
        <button id="restoreBtn" type="button">撤销删除/导入</button>
        <select class="style-select" id="styleSelect" aria-label="选择界面风格" title="选择界面风格">
          <option value="warm">风格：温暖纸感</option>
          <option value="minimal">风格：现代简约</option>
          <option value="vivid">风格：鲜明活泼</option>
        </select>
        <select class="theme-select" id="themeSelect" aria-label="选择主题色" title="选择主题色">
          <option value="forest">主题色：松叶绿</option>
          <option value="coral">主题色：珊瑚粉</option>
          <option value="sky">主题色：晴空蓝</option>
          <option value="lilac">主题色：葡萄紫</option>
          <option value="rouge">主题色：胭脂红</option>
          <option value="teal">主题色：黛青</option>
          <option value="amber">主题色：琥珀橘</option>
          <option value="clay">主题色：茶棕</option>
        </select>
        <input class="hidden-file" id="importFile" type="file" accept="application/json,.json">
      </div>
    </header>

    <section class="layout" id="mainLayout">
      <section class="panel library" aria-label="小说列表">
        <div class="toolbar">
          <div class="search-row">
            <input id="searchInput" type="text" placeholder="搜索小说名、作者、标签、笔记">
            <button class="icon-button" id="clearSearchBtn" type="button" title="清空搜索" aria-label="清空搜索">×</button>
          </div>
          <div class="filter-row">
            <select id="statusFilter" aria-label="按状态筛选">
              <option value="">全部状态</option>
            </select>
            <select id="tagFilter" aria-label="按标签筛选">
              <option value="">全部标签</option>
            </select>
            <select id="sortSelect" aria-label="排序">
              <option value="updated-desc">最近更新</option>
              <option value="rating-desc">推荐指数最高</option>
              <option value="title-asc">小说名 A-Z</option>
              <option value="created-desc">最近创建</option>
            </select>
          </div>
          <div class="stats-row" id="statsRow"></div>
          <div class="view-switch" id="viewSwitch" role="group" aria-label="切换书单视图">
            <button class="active" type="button" data-view-mode="card">卡片</button>
            <button type="button" data-view-mode="list">列表</button>
            <button type="button" data-view-mode="table">表格</button>
          </div>
        </div>
        <div class="book-list">
          <div class="list-head" aria-hidden="true">
            <span>小说</span>
            <span>标签</span>
            <span>状态</span>
            <span>推荐</span>
            <span>更新</span>
          </div>
          <div id="bookRows"></div>
        </div>
      </section>

      <section class="panel editor" aria-label="小说详情">
        <div class="editor-head">
          <div class="editor-title-row">
            <h2 id="editorHeading">新建记录</h2>
            <button id="closeDetailBtn" type="button">← 返回书单</button>
          </div>
          <p class="subtitle" id="editorMeta">本地自动保存</p>
          <div class="date-strip" id="dateStrip"></div>
        </div>

        <form class="editor-body" id="bookForm">
          <div class="manual-form-block">
            <div class="section-title">基本信息</div>
            <div class="field-grid">
              <label>小说名
                <input id="titleField" name="title" autocomplete="off" required>
              </label>
              <label>作者
                <input id="authorField" name="author" autocomplete="off">
              </label>
              <label>阅读平台
                <input id="platformField" name="platform" autocomplete="off">
              </label>
              <label>阅读进度
                <input id="progressField" name="progress" autocomplete="off">
              </label>
              <label>开始阅读
                <input id="recordedAtField" name="recordedAt" type="date">
              </label>
              <label>读完时间
                <input id="finishedAtField" name="finishedAt" type="date">
              </label>
              <label>状态
                <select id="statusField" name="status"></select>
              </label>
              <label>感受
                <input id="feelingField" name="feeling" autocomplete="off" placeholder="爽文、好玩儿、有意思、没看完、不好看">
              </label>
              <label>推荐指数
                <div class="star-control" id="ratingControl" aria-label="推荐指数"></div>
              </label>
              <label class="wide">类型 / 标签
                <input id="tagsField" name="tags" autocomplete="off">
              </label>
            </div>

            <div class="section-title">主要人物</div>
            <div class="field-grid">
              <label>男主
                <input id="maleLeadField" name="maleLead" autocomplete="off">
              </label>
              <label>女主
                <input id="femaleLeadField" name="femaleLead" autocomplete="off">
              </label>
            </div>

            <div class="section-title">故事内容</div>
            <label>我认为的故事情节
              <textarea id="plotField" name="plot"></textarea>
            </label>

            <div class="section-title">我的阅读记录</div>
            <label>印象深刻的情节
              <textarea id="sceneField" name="scene"></textarea>
            </label>
          </div>
        </form>

        <div class="footer">
          <span class="save-state" id="saveState">已自动保存</span>
          <div class="footer-actions">
            <button class="danger" id="deleteBtn" type="button">删除记录</button>
            <button id="duplicateBtn" type="button">复制一条</button>
            <button class="primary" id="saveBtn" type="submit" form="bookForm">确认保存</button>
          </div>
        </div>
      </section>
    </section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "offline.novelTracker.v1";
    const SAFETY_SNAPSHOT_KEY = "offline.novelTracker.safetySnapshot.v1";
    const LAST_EXPORT_KEY = "offline.novelTracker.lastExportAt.v1";
    const THEME_KEY = "offline.novelTracker.theme.v1";
    const STYLE_KEY = "offline.novelTracker.style.v1";
    const VIEW_KEY = "offline.novelTracker.view.v1";
    const STATUSES = ["想看", "在看", "追更", "已读完", "弃文"];
    const state = {
      books: [],
      viewMode: localStorage.getItem(VIEW_KEY) || "card",
      selectedId: null,
      query: "",
      status: "",
      tag: "",
      sort: "updated-desc",
      ratingDraft: 0,
      saveTimer: null,
      toastTimer: null,
      saveButtonTimer: null
    };

    const el = {
      newBookBtn: document.getElementById("newBookBtn"),
      exportBtn: document.getElementById("exportBtn"),
      importBtn: document.getElementById("importBtn"),
      restoreBtn: document.getElementById("restoreBtn"),
      themeSelect: document.getElementById("themeSelect"),
      styleSelect: document.getElementById("styleSelect"),
      mainLayout: document.getElementById("mainLayout"),
      importFile: document.getElementById("importFile"),
      searchInput: document.getElementById("searchInput"),
      clearSearchBtn: document.getElementById("clearSearchBtn"),
      statusFilter: document.getElementById("statusFilter"),
      tagFilter: document.getElementById("tagFilter"),
      sortSelect: document.getElementById("sortSelect"),
      statsRow: document.getElementById("statsRow"),
      viewSwitch: document.getElementById("viewSwitch"),
      bookRows: document.getElementById("bookRows"),
      editorHeading: document.getElementById("editorHeading"),
      editorMeta: document.getElementById("editorMeta"),
      dateStrip: document.getElementById("dateStrip"),
      closeDetailBtn: document.getElementById("closeDetailBtn"),
      deleteBtn: document.getElementById("deleteBtn"),
      bookForm: document.getElementById("bookForm"),
      titleField: document.getElementById("titleField"),
      authorField: document.getElementById("authorField"),
      platformField: document.getElementById("platformField"),
      progressField: document.getElementById("progressField"),
      recordedAtField: document.getElementById("recordedAtField"),
      finishedAtField: document.getElementById("finishedAtField"),
      statusField: document.getElementById("statusField"),
      tagsField: document.getElementById("tagsField"),
      maleLeadField: document.getElementById("maleLeadField"),
      femaleLeadField: document.getElementById("femaleLeadField"),
      plotField: document.getElementById("plotField"),
      feelingField: document.getElementById("feelingField"),
      sceneField: document.getElementById("sceneField"),
      ratingControl: document.getElementById("ratingControl"),
      duplicateBtn: document.getElementById("duplicateBtn"),
      saveBtn: document.getElementById("saveBtn"),
      saveState: document.getElementById("saveState"),
      toast: document.getElementById("toast")
    };

    function nowIso() {
      return new Date().toISOString();
    }

    function createBook(overrides = {}) {
      const timestamp = nowIso();
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : `book-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        title: "",
        author: "",
        platform: "",
        progress: "",
        status: "想看",
        rating: 0,
        tags: [],
        maleLead: "",
        femaleLead: "",
        plot: "",
        feeling: "",
        scene: "",
        createdAt: timestamp,
        updatedAt: timestamp,
        recordedAt: "",
        finishedAt: "",
        ...overrides
      };
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function parseTags(value) {
      return String(value || "")
        .split(/[,，、\n]/)
        .map((tag) => tag.trim())
        .filter(Boolean)
        .filter((tag, index, array) => array.indexOf(tag) === index);
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return `${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")}`;
    }

    function fullDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function shortDateTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function toLocalDateString(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function dateInputValue(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) return toLocalDateString(new Date());
      return toLocalDateString(date);
    }

    function optionalDateInputValue(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return toLocalDateString(date);
    }

    function isoFromDateInput(value, fallback = nowIso()) {
      if (!value) return fallback;
      const date = new Date(`${value}T12:00:00`);
      if (Number.isNaN(date.getTime())) return fallback;
      return date.toISOString();
    }

    function loadBooks() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        state.books = Array.isArray(parsed) ? parsed.map(normalizeBook) : [];
      } catch (error) {
        state.books = [];
      }
      state.selectedId = null;
    }

    function normalizeBook(book) {
      const base = createBook();
      const storyParts = [book.plot, book.summary]
        .map((value) => String(value || "").trim())
        .filter((value, index, array) => value && array.indexOf(value) === index);
      const { summary, ...rest } = book;
      return {
        ...base,
        ...rest,
        tags: Array.isArray(book.tags) ? book.tags : parseTags(book.tags),
        rating: Math.max(0, Math.min(5, Number(book.rating) || 0)),
        status: STATUSES.includes(book.status) ? book.status : "想看",
        recordedAt: book.recordedAt || "",
        finishedAt: book.finishedAt || "",
        plot: storyParts.join("\n\n")
      };
    }

    function setSaveState(message, type = "") {
      el.saveState.textContent = message;
      el.saveState.classList.remove("pending", "confirmed");
      if (type) el.saveState.classList.add(type);
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.books));
      setSaveState("已自动保存", "confirmed");
    }

    function captureSafetySnapshot(reason) {
      try {
        localStorage.setItem(SAFETY_SNAPSHOT_KEY, JSON.stringify({
          reason,
          createdAt: nowIso(),
          books: state.books
        }));
      } catch (error) {
        console.warn("Safety snapshot failed:", error);
      }
    }

    function readSafetySnapshot() {
      try {
        const snapshot = JSON.parse(localStorage.getItem(SAFETY_SNAPSHOT_KEY) || "null");
        if (!snapshot || !Array.isArray(snapshot.books)) return null;
        return snapshot;
      } catch (error) {
        return null;
      }
    }

    function queueSave() {
      setSaveState("自动保存中", "pending");
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(() => {
        saveCurrentFromForm(false);
      }, 420);
    }

    function selectedBook() {
      return state.books.find((book) => book.id === state.selectedId) || null;
    }

    function filteredBooks() {
      const query = state.query.trim().toLowerCase();
      return state.books
        .filter((book) => {
          const haystack = [
            book.title,
            book.author,
            book.platform,
            book.progress,
            book.status,
            book.tags.join(" "),
            book.maleLead,
            book.femaleLead,
            book.plot,
            book.feeling,
            book.scene,
            book.recommendation
          ].join(" ").toLowerCase();
          return (!query || haystack.includes(query)) &&
            (!state.status || book.status === state.status) &&
            (!state.tag || book.tags.includes(state.tag));
        })
        .sort((a, b) => {
          if (state.sort === "rating-desc") return (b.rating - a.rating) || compareDate(b.updatedAt, a.updatedAt);
          if (state.sort === "title-asc") return (a.title || "").localeCompare(b.title || "", "zh-CN");
          if (state.sort === "created-desc") return compareDate(b.createdAt, a.createdAt);
          return compareDate(b.updatedAt, a.updatedAt);
        });
    }

    function compareDate(left, right) {
      return new Date(left || 0).getTime() - new Date(right || 0).getTime();
    }

    function renderFilters() {
      el.statusFilter.innerHTML = '<option value="">全部状态</option>' +
        STATUSES.map((status) => `<option value="${escapeHtml(status)}">${escapeHtml(status)}</option>`).join("");
      el.statusField.innerHTML = STATUSES.map((status) => `<option value="${escapeHtml(status)}">${escapeHtml(status)}</option>`).join("");

      const allTags = [...new Set(state.books.flatMap((book) => book.tags))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      el.tagFilter.innerHTML = '<option value="">全部标签</option>' +
        allTags.map((tag) => `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`).join("");
      el.statusFilter.value = state.status;
      el.tagFilter.value = state.tag;
    }

    function renderStats(list) {
      const total = state.books.length;
      const reading = state.books.filter((book) => book.status === "在看" || book.status === "追更").length;
      const done = state.books.filter((book) => book.status === "已读完").length;
      const lastExportAt = localStorage.getItem(LAST_EXPORT_KEY);
      el.statsRow.innerHTML = `
        <span class="pill">总计 ${total} 本</span>
        <span class="pill">在看/追更 ${reading} 本</span>
        <span class="pill">已读完 ${done} 本</span>
        <span class="pill">当前显示 ${list.length} 本</span>
        <span class="pill">${lastExportAt ? `上次备份 ${escapeHtml(shortDateTime(lastExportAt))}` : "建议定期导出备份"}</span>
      `;
    }

    function renderRowContent(book) {
      const tags = book.tags.slice(0, 4).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
      const moreTags = book.tags.length > 4 ? `<span class="tag">+${book.tags.length - 4}</span>` : "";
      const leads = [book.maleLead && `男主：${book.maleLead}`, book.femaleLead && `女主：${book.femaleLead}`].filter(Boolean).join(" / ");
      const note = book.feeling || book.scene || book.plot || "";
      return `
        <span class="book-main">
          <span class="book-title">${escapeHtml(book.title || "未命名小说")}</span>
          <span class="book-meta">${escapeHtml([book.author, book.platform, book.progress].filter(Boolean).join(" · ") || leads || "未填写作者/平台")}</span>
          <span class="book-note">${escapeHtml(note || "还没有写阅读记录")}</span>
        </span>
        <span class="tag-cloud">${tags}${moreTags}</span>
        <span><span class="status status-${escapeHtml(book.status)}">${escapeHtml(book.status)}</span></span>
        <span class="rating">${renderStars(book.rating)}</span>
        <span class="book-meta">${escapeHtml(formatDate(book.updatedAt))}</span>
      `;
    }

    function renderRow(book) {
      return `
        <button class="book-row ${book.id === state.selectedId ? "active" : ""}" type="button" data-id="${escapeHtml(book.id)}">
          ${renderRowContent(book)}
        </button>
      `;
    }

    function renderCard(book) {
      const tags = book.tags.slice(0, 5).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
      const moreTags = book.tags.length > 5 ? `<span class="tag">+${book.tags.length - 5}</span>` : "";
      const note = book.feeling || book.scene || book.plot || "还没有写阅读记录";
      const meta = [book.author, book.platform, book.progress].filter(Boolean).join(" · ") || "未填写作者/平台";
      return `
        <button class="book-card ${book.id === state.selectedId ? "active" : ""}" type="button" data-id="${escapeHtml(book.id)}">
          <span class="card-top">
            <span class="card-line">
              <span class="status status-${escapeHtml(book.status)}">${escapeHtml(book.status)}</span>
              <span class="book-meta">${escapeHtml(formatDate(book.updatedAt))}</span>
            </span>
            <span class="book-title">${escapeHtml(book.title || "未命名小说")}</span>
            <span class="book-meta">${escapeHtml(meta)}</span>
            <span class="book-note">${escapeHtml(note)}</span>
          </span>
          <span class="card-bottom">
            <span class="tag-cloud">${tags}${moreTags}</span>
            <span class="rating">${renderStars(book.rating)}</span>
          </span>
        </button>
      `;
    }

    function renderTable(list) {
      const rows = list.map((book) => {
        const tags = book.tags.slice(0, 4).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
        const note = book.feeling || book.scene || book.plot || "";
        return `
          <tr class="${book.id === state.selectedId ? "active" : ""}" data-id="${escapeHtml(book.id)}">
            <td class="table-title">${escapeHtml(book.title || "未命名小说")}</td>
            <td>${escapeHtml(book.author || "未记录")}</td>
            <td>${escapeHtml(book.platform || "未记录")}</td>
            <td>${escapeHtml(book.progress || "未记录")}</td>
            <td><span class="status status-${escapeHtml(book.status)}">${escapeHtml(book.status)}</span></td>
            <td><span class="rating">${renderStars(book.rating)}</span></td>
            <td>${tags || '<span class="book-meta">未打标签</span>'}</td>
            <td class="table-note">${escapeHtml(note || "还没有写阅读记录")}</td>
            <td>${escapeHtml(formatDate(book.updatedAt))}</td>
          </tr>
        `;
      }).join("");
      return `
        <div class="book-table-wrap">
          <table class="book-table">
            <thead>
              <tr>
                <th>小说名</th>
                <th>作者</th>
                <th>平台</th>
                <th>进度</th>
                <th>状态</th>
                <th>推荐</th>
                <th>标签</th>
                <th>阅读记录</th>
                <th>更新</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function updateSelectedRowInPlace(book) {
      const row = el.bookRows.querySelector(`[data-id="${CSS.escape(book.id)}"]`);
      if (row && state.viewMode === "list") row.innerHTML = renderRowContent(book);
      else renderRows();
      renderStats(filteredBooks());
    }

    function renderRows() {
      const list = filteredBooks();
      renderStats(list);
      state.viewMode = ["card", "list", "table"].includes(state.viewMode) ? state.viewMode : "card";
      el.viewSwitch.querySelectorAll("[data-view-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.viewMode === state.viewMode);
      });
      el.bookRows.className = state.viewMode === "card" ? "book-cards" : "";
      const listHead = document.querySelector(".list-head");
      if (listHead) listHead.hidden = state.viewMode !== "list";
      if (!list.length) {
        el.bookRows.innerHTML = state.books.length
          ? '<div class="empty">没有匹配记录。</div>'
          : '<div class="empty">还没有小说记录。点击“新建记录”开始。</div>';
        return;
      }

      if (state.viewMode === "table") {
        el.bookRows.innerHTML = renderTable(list);
      } else if (state.viewMode === "card") {
        el.bookRows.innerHTML = list.map(renderCard).join("");
      } else {
        el.bookRows.innerHTML = list.map(renderRow).join("");
      }
    }

    function renderStars(rating) {
      const count = Math.max(0, Math.min(5, Number(rating) || 0));
      const rounded = Math.round(count);
      const stars = "★★★★★".slice(0, rounded) + "☆☆☆☆☆".slice(0, 5 - rounded);
      const label = count ? `<span class="rating-number">${count % 1 ? count.toFixed(1) : count}</span>` : "";
      return `${stars}${label}`;
    }

    function renderRatingControl() {
      el.ratingControl.innerHTML = [1, 2, 3, 4, 5].map((value) => `
        <button type="button" class="${value <= state.ratingDraft ? "active" : ""}" data-rating="${value}" aria-label="${value} 星">★</button>
      `).join("");
    }

    function showToast(message, type = "info") {
      el.toast.textContent = message;
      el.toast.classList.toggle("error", type === "error");
      el.toast.classList.add("active");
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => {
        el.toast.classList.remove("active");
      }, type === "error" ? 5200 : 3200);
    }

    function flashSaveButton(message = "已保存 ✓") {
      el.saveBtn.textContent = message;
      el.saveBtn.classList.remove("save-flash");
      void el.saveBtn.offsetWidth;
      el.saveBtn.classList.add("save-flash");
      clearTimeout(state.saveButtonTimer);
      state.saveButtonTimer = setTimeout(() => {
        el.saveBtn.textContent = "确认保存";
        el.saveBtn.classList.remove("save-flash");
      }, 1200);
    }

    function confirmManualSave() {
      clearTimeout(state.saveTimer);
      const changed = saveCurrentFromForm(true);
      setSaveState(changed ? "已手动保存" : "已确认保存", "confirmed");
      showToast(changed ? "修改已保存。" : "没有新的修改，内容已经是最新。");
      flashSaveButton();
    }

    function renderEditor() {
      const book = selectedBook();
      const disabled = !book;
      [...el.bookForm.elements].forEach((field) => {
        field.disabled = disabled;
      });
      el.deleteBtn.disabled = disabled;
      el.duplicateBtn.disabled = disabled;

      if (!book) {
        el.editorHeading.textContent = "没有选中记录";
        el.editorMeta.textContent = "新建一条开始记录";
        el.dateStrip.innerHTML = "";
        el.bookForm.reset();
        state.ratingDraft = 0;
        renderRatingControl();
        return;
      }

      el.editorHeading.textContent = book.title || "未命名小说";
      el.editorMeta.textContent = `创建：${fullDate(book.createdAt)} · 更新：${fullDate(book.updatedAt)}`;
      el.dateStrip.innerHTML = `
        ${book.recordedAt ? `<span class="date-chip">开始阅读：${escapeHtml(formatDate(book.recordedAt))}</span>` : ""}
        ${book.finishedAt ? `<span class="date-chip">读完：${escapeHtml(formatDate(book.finishedAt))}</span>` : ""}
        <span class="date-chip">修改：${escapeHtml(formatDate(book.updatedAt))}</span>
      `;
      el.titleField.value = book.title || "";
      el.authorField.value = book.author || "";
      el.platformField.value = book.platform || "";
      el.progressField.value = book.progress || "";
      el.recordedAtField.value = optionalDateInputValue(book.recordedAt);
      el.finishedAtField.value = optionalDateInputValue(book.finishedAt);
      el.statusField.value = book.status || "想看";
      el.tagsField.value = book.tags.join("、");
      el.maleLeadField.value = book.maleLead || "";
      el.femaleLeadField.value = book.femaleLead || "";
      el.plotField.value = book.plot || "";
      el.feelingField.value = book.feeling || "";
      el.sceneField.value = book.scene || "";
      state.ratingDraft = book.rating || 0;
      renderRatingControl();
    }

    function renderAll() {
      el.mainLayout.classList.toggle("detail-open", Boolean(selectedBook()));
      renderFilters();
      renderRows();
      renderEditor();
    }

    function scrollEditorIntoViewOnMobile() {
      if (!window.matchMedia("(max-width: 1120px)").matches) return;
      const editor = document.querySelector(".editor");
      if (editor) editor.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function flushPendingSave() {
      clearTimeout(state.saveTimer);
      saveCurrentFromForm(false);
    }

    function closeDetails() {
      saveCurrentFromForm(false);
      state.selectedId = null;
      renderAll();
    }

    function readFormDraft(book) {
      return {
        title: el.titleField.value.trim(),
        author: el.authorField.value.trim(),
        platform: el.platformField.value.trim(),
        progress: el.progressField.value.trim(),
        recordedAt: el.recordedAtField.value ? isoFromDateInput(el.recordedAtField.value, book.recordedAt || nowIso()) : "",
        finishedAt: el.finishedAtField.value ? isoFromDateInput(el.finishedAtField.value, "") : "",
        status: el.statusField.value,
        rating: state.ratingDraft,
        tags: parseTags(el.tagsField.value),
        maleLead: el.maleLeadField.value.trim(),
        femaleLead: el.femaleLeadField.value.trim(),
        plot: el.plotField.value.trim(),
        feeling: el.feelingField.value.trim(),
        scene: el.sceneField.value.trim()
      };
    }

    function sameTags(left, right) {
      const a = Array.isArray(left) ? left : [];
      const b = Array.isArray(right) ? right : [];
      return a.length === b.length && a.every((tag, index) => tag === b[index]);
    }

    function formDraftChanged(book, draft) {
      return book.title !== draft.title ||
        book.author !== draft.author ||
        book.platform !== draft.platform ||
        book.progress !== draft.progress ||
        dateInputValue(book.recordedAt) !== dateInputValue(draft.recordedAt) ||
        optionalDateInputValue(book.finishedAt) !== optionalDateInputValue(draft.finishedAt) ||
        book.status !== draft.status ||
        Number(book.rating || 0) !== Number(draft.rating || 0) ||
        !sameTags(book.tags, draft.tags) ||
        book.maleLead !== draft.maleLead ||
        book.femaleLead !== draft.femaleLead ||
        book.plot !== draft.plot ||
        book.feeling !== draft.feeling ||
        book.scene !== draft.scene;
    }

    function refreshEditorMeta(book) {
      el.editorHeading.textContent = book.title || "未命名小说";
      el.editorMeta.textContent = `创建：${fullDate(book.createdAt)} · 更新：${fullDate(book.updatedAt)}`;
      el.dateStrip.innerHTML = `
        ${book.recordedAt ? `<span class="date-chip">开始阅读：${escapeHtml(formatDate(book.recordedAt))}</span>` : ""}
        ${book.finishedAt ? `<span class="date-chip">读完：${escapeHtml(formatDate(book.finishedAt))}</span>` : ""}
        <span class="date-chip">修改：${escapeHtml(formatDate(book.updatedAt))}</span>
      `;
    }

    function saveCurrentFromForm(updateView = true) {
      const book = selectedBook();
      if (!book) return;
      const draft = readFormDraft(book);
      const changed = formDraftChanged(book, draft);
      if (!changed) {
        if (updateView) renderAll();
        return false;
      }
      Object.assign(book, draft);
      book.updatedAt = nowIso();
      persist();
      if (updateView) renderAll();
      else {
        refreshEditorMeta(book);
        updateSelectedRowInPlace(book);
      }
      return true;
    }

    function addBook() {
      saveCurrentFromForm(false);
      const book = createBook({ status: "在看", recordedAt: nowIso() });
      state.books.unshift(book);
      state.selectedId = book.id;
      persist();
      renderAll();
      scrollEditorIntoViewOnMobile();
      el.titleField.focus();
    }

    function deleteSelected() {
      const book = selectedBook();
      if (!book) return;
      if (!confirm(`删除「${book.title || "未命名小说"}」？`)) return;
      captureSafetySnapshot("delete");
      state.books = state.books.filter((item) => item.id !== book.id);
      state.selectedId = null;
      persist();
      renderAll();
      setSaveState("已删除，可在顶部撤销", "confirmed");
    }

    function duplicateSelected() {
      saveCurrentFromForm(false);
      const book = selectedBook();
      if (!book) return;
      const { id, ...bookWithoutId } = book;
      const copy = createBook({
        ...bookWithoutId,
        title: `${book.title || "未命名小说"} 副本`,
        createdAt: nowIso(),
        updatedAt: nowIso()
      });
      state.books.unshift(copy);
      state.selectedId = copy.id;
      persist();
      renderAll();
    }

    function exportJson() {
      saveCurrentFromForm(false);
      const blob = new Blob([JSON.stringify(state.books, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `novel-records-${stamp}.json`;
      link.click();
      URL.revokeObjectURL(url);
      localStorage.setItem(LAST_EXPORT_KEY, nowIso());
      renderRows();
    }

    async function importJson(file) {
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error("JSON root is not an array");
        const incoming = parsed.map(normalizeBook);
        captureSafetySnapshot("import");
        const byId = new Map(state.books.map((book) => [book.id, book]));
        incoming.forEach((book) => byId.set(book.id, book));
        state.books = [...byId.values()].sort((a, b) => compareDate(b.updatedAt, a.updatedAt));
        state.selectedId = null;
        persist();
        renderAll();
        alert(`导入完成：${incoming.length} 条记录`);
      } catch (error) {
        alert("导入失败，请确认是这个工具导出的 JSON。");
      } finally {
        el.importFile.value = "";
      }
    }

    function restoreSafetySnapshot() {
      const snapshot = readSafetySnapshot();
      if (!snapshot) {
        alert("目前没有可以撤销的删除或导入操作。");
        return;
      }
      const time = shortDateTime(snapshot.createdAt);
      const action = snapshot.reason === "delete" ? "删除" : snapshot.reason === "import" ? "导入" : "上一次操作";
      if (!confirm(`撤销 ${time} 的${action}？`)) return;
      captureSafetySnapshot("restore-current");
      state.books = snapshot.books.map(normalizeBook);
      state.selectedId = null;
      persist();
      renderAll();
      setSaveState("已撤销上一次操作", "confirmed");
      showToast("已撤销上一次删除或导入。");
    }

    function bindEvents() {
      el.newBookBtn.addEventListener("click", addBook);
      el.closeDetailBtn.addEventListener("click", closeDetails);
      el.deleteBtn.addEventListener("click", deleteSelected);
      el.duplicateBtn.addEventListener("click", duplicateSelected);
      el.exportBtn.addEventListener("click", exportJson);
      el.importBtn.addEventListener("click", () => el.importFile.click());
      el.restoreBtn.addEventListener("click", restoreSafetySnapshot);
      el.importFile.addEventListener("change", (event) => importJson(event.target.files[0]));
      el.clearSearchBtn.addEventListener("click", () => {
        state.query = "";
        el.searchInput.value = "";
        renderRows();
        el.searchInput.focus();
      });

      el.searchInput.addEventListener("input", (event) => {
        state.query = event.target.value;
        renderRows();
      });
      el.statusFilter.addEventListener("change", (event) => {
        state.status = event.target.value;
        renderRows();
      });
      el.tagFilter.addEventListener("change", (event) => {
        state.tag = event.target.value;
        renderRows();
      });
      el.sortSelect.addEventListener("change", (event) => {
        state.sort = event.target.value;
        renderRows();
      });
      el.themeSelect.addEventListener("change", (event) => {
        applyTheme(event.target.value);
        const label = event.target.options[event.target.selectedIndex].text.replace("主题色：", "");
        showToast(`已切换主题色：${label}。`);
      });
      el.styleSelect.addEventListener("change", (event) => {
        applyStyle(event.target.value);
        const label = event.target.options[event.target.selectedIndex].text.replace("风格：", "");
        showToast(`已切换风格：${label}。`);
      });

      el.viewSwitch.addEventListener("click", (event) => {
        const button = event.target.closest("[data-view-mode]");
        if (!button) return;
        state.viewMode = ["card", "list", "table"].includes(button.dataset.viewMode) ? button.dataset.viewMode : "card";
        localStorage.setItem(VIEW_KEY, state.viewMode);
        renderRows();
      });

      el.bookRows.addEventListener("click", (event) => {
        const row = event.target.closest("[data-id]");
        if (!row) return;
        event.preventDefault();
        if (event.detail > 1 || state.selectedId === row.dataset.id) return;
        saveCurrentFromForm(false);
        state.selectedId = row.dataset.id;
        renderAll();
        scrollEditorIntoViewOnMobile();
      });
      el.bookRows.addEventListener("dblclick", (event) => {
        event.preventDefault();
      });
      document.addEventListener("dblclick", (event) => {
        if (!event.target.closest("input, textarea, select")) event.preventDefault();
      }, { passive: false });

      el.bookForm.addEventListener("submit", (event) => {
        event.preventDefault();
        confirmManualSave();
      });
      el.saveBtn.addEventListener("click", (event) => {
        event.preventDefault();
        confirmManualSave();
      });
      el.bookForm.addEventListener("input", queueSave);
      el.bookForm.addEventListener("change", queueSave);

      el.ratingControl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-rating]");
        if (!button) return;
        const value = Number(button.dataset.rating);
        state.ratingDraft = state.ratingDraft === value ? 0 : value;
        renderRatingControl();
        queueSave();
      });

      el.statusField.addEventListener("change", () => {
        if (el.statusField.value === "已读完" && !el.finishedAtField.value) {
          el.finishedAtField.value = dateInputValue();
        }
      });

      document.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") {
          if (!selectedBook()) return;
          event.preventDefault();
          confirmManualSave();
        }
      });

      window.addEventListener("pagehide", flushPendingSave);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") flushPendingSave();
      });
    }

    // 主题色：只设置配色变量（强调色 + 标签/状态色），不碰底色、字体、圆角（那些由「风格」控制）
    // 配色跟随「风格」调明度/饱和：纸感低饱和雅致，简约取中，活泼鲜亮
    const PALETTES = {
      warm: {
        forest: "--green:#42685a; --green-soft:#e7eee9;",
        coral:  "--green:#bf6f63; --green-soft:#f5e7e2;",
        sky:    "--green:#4f7390; --green-soft:#e7edf2;",
        lilac:  "--green:#79688c; --green-soft:#ece7f1;",
        rouge:  "--green:#a4505d; --green-soft:#f2e2e4;",
        teal:   "--green:#3f7570; --green-soft:#e3ecea;",
        amber:  "--green:#a9762f; --green-soft:#f4ebd9;",
        clay:   "--green:#8a6450; --green-soft:#efe6de;"
      },
      minimal: {
        forest: "--green:#2f7d5e; --green-soft:#e6f1ec;",
        coral:  "--green:#e2685c; --green-soft:#fbe7e3;",
        sky:    "--green:#3a7ca5; --green-soft:#e7eef4;",
        lilac:  "--green:#8265c0; --green-soft:#ece7f3;",
        rouge:  "--green:#c0455a; --green-soft:#f6e1e5;",
        teal:   "--green:#2f8079; --green-soft:#e2eeec;",
        amber:  "--green:#c2861f; --green-soft:#f6ecd6;",
        clay:   "--green:#a06848; --green-soft:#f1e5dc;"
      },
      vivid: {
        forest: "--green:#1f9d6b; --green-soft:#ddf5ea;",
        coral:  "--green:#ff6f5e; --green-soft:#ffe7e2;",
        sky:    "--green:#2196d4; --green-soft:#e0f2fc;",
        lilac:  "--green:#9b6dff; --green-soft:#efe8ff;",
        rouge:  "--green:#e23b56; --green-soft:#fce1e5;",
        teal:   "--green:#12a89c; --green-soft:#d8f3f0;",
        amber:  "--green:#e8920f; --green-soft:#fdeecf;",
        clay:   "--green:#c47a4f; --green-soft:#f8e7da;"
      }
    };

    // 风格：控制底色、文字色、线条、圆角、字体、密度、阴影
    const STYLES = {
      "warm": `
        :root { --bg:#f6f0e6; --paper:#fffdf8; --paper-2:#f7f1e6; --ink:#3a322a; --muted:#8a7d6c; --line:#ead9c4; --line-strong:#ddc8aa; --shadow:0 10px 28px rgba(120,90,50,.10); }
        body { background:linear-gradient(180deg,#fffdf8 0,#f6f0e6 280px); }
        h1, .editor-title-row h2, .book-title { font-family:Georgia,"Songti SC","STSong",serif; }
        button, input, textarea, select, .panel, .pill, .manual-form-block, .toast, .icon-button { border-radius:14px; }
        .mark { border-radius:50%; }
        .book-row { min-height:78px; border-radius:0; }
        .star-control button { border-radius:12px; }
      `,
      "minimal": `
        :root { --bg:#fbfbfc; --paper:#ffffff; --paper-2:#f6f7f9; --ink:#1a1d21; --muted:#7c828c; --line:#ebedf0; --line-strong:#dde0e4; --shadow:0 1px 2px rgba(20,25,35,.05),0 4px 12px rgba(20,25,35,.04); }
        body { background:#fbfbfc; }
        button, input, textarea, select, .panel, .manual-form-block, .toast, .icon-button, .star-control button { border-radius:7px; }
        .book-row { min-height:62px; }
        .status, .tag { font-weight:600; }
        .editor { border-left-width:3px; }
      `,
      "vivid": `
        :root { --bg:#f3f6ff; --paper:#ffffff; --paper-2:#f1f5ff; --ink:#1e2330; --muted:#6b7488; --line:#e2e8f5; --line-strong:#cdd6ec; --shadow:0 10px 26px rgba(60,80,180,.14); }
        body { background:linear-gradient(180deg,#fff 0,#f3f6ff 300px); }
        button, input, textarea, select, .panel, .pill, .manual-form-block, .toast, .icon-button, .star-control button { border-radius:12px; }
        .book-row { min-height:72px; }
        .status, .tag { font-weight:700; }
      `
    };

    function ensureStyleTag(id) {
      let tag = document.getElementById(id);
      if (!tag) {
        tag = document.createElement("style");
        tag.id = id;
        document.head.appendChild(tag);
      }
      return tag;
    }

    function currentStyle() {
      const s = localStorage.getItem(STYLE_KEY) || "warm";
      return s in STYLES ? s : "warm";
    }

    function currentColor() {
      const c = localStorage.getItem(THEME_KEY) || "forest";
      return c in PALETTES.warm ? c : "forest";
    }

    function applyAppearance() {
      const s = currentStyle();
      const c = currentColor();
      ensureStyleTag("activeStyleStyles").textContent = STYLES[s];
      ensureStyleTag("activeThemeStyles").textContent = `:root { ${PALETTES[s][c]} }`;
      el.styleSelect.value = s;
      el.themeSelect.value = c;
    }

    function applyStyle(selectedStyle) {
      const s = selectedStyle && selectedStyle in STYLES ? selectedStyle : currentStyle();
      localStorage.setItem(STYLE_KEY, s);
      applyAppearance();
    }

    function applyTheme(selectedTheme) {
      const c = selectedTheme && selectedTheme in PALETTES.warm ? selectedTheme : currentColor();
      localStorage.setItem(THEME_KEY, c);
      applyAppearance();
    }

    loadBooks();
    applyAppearance();
    bindEvents();
    renderAll();
  </script>
</body>
</html>
